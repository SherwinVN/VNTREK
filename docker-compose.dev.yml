services:
  trek-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: trek-dev
    ports:
      - "5173:5173"
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/shared/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
    restart: unless-stopped
